</head>
<body>
    
 <header class="navbar">

        <div class="logo-icon">
            <img src="img/CHAMPS.png" alt="Logo Champs" class="brand-logo-img">
        </div>

    </div>
    <div class="menu-icon" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </div>
</header>

    <nav class="mobile-menu" id="mobileMenu">
        <ul>
            <li><a href="index.html">Inicio</a></li>

    <a href="trivias_menu.html" class="back-btn">
        <span>←</span> Volver al Menú
    </a>

    <div class="container">
        <div class="quiz-card" id="quiz-container">
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <h2 id="question-text">Cargando desafío...</h2>
            <div class="options-grid" id="answer-buttons"></div>
            <div id="feedback" style="margin-top: 20px; font-weight: bold;"></div>
        </div>

        <div id="result-screen" class="quiz-card" style="display: none; text-align: center;">
    <h2 style="color: var(--yellow);">RESULTADOS FINALES</h2>
    <div id="final-score" style="margin: 20px 0;"></div>
    <button onclick="location.href='trivias_menu.html'" class="back-btn" 
            style="background: var(--yellow); color: black; padding: 12px 25px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; display: inline-block;">
        VOLVER AL MENÚ
    </button>
</div>
    </div>

  <script src="preguntas.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pais = (urlParams.get('pais') || 'mex').toUpperCase(); 
        
        let currentQuestionIndex = 0;
        let score = 0;
        
        const preguntas = bancoPreguntas[pais];

        function showQuestion() {
 
            if (!preguntas) {
                document.getElementById('question-text').innerText = "Trivia no disponible para: " + pais;
                document.getElementById('answer-buttons').innerHTML = 
                    '<button onclick="window.history.back()" class="option-btn">Volver atrás</button>';
                return;
            }

            resetState();
            const question = preguntas[currentQuestionIndex];
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${question.q}`;
            
            document.getElementById('progress-fill').style.width = `${((currentQuestionIndex) / preguntas.length) * 100}%`;

            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.addEventListener('click', () => selectAnswer(index, question.correct));
                document.getElementById('answer-buttons').appendChild(button);
            });
        }

        function resetState() {
            document.getElementById('answer-buttons').innerHTML = '';
            document.getElementById('feedback').innerText = '';
        }

        function selectAnswer(index, correctIndex) {
            const buttons = document.querySelectorAll('.option-btn');
            if (index === correctIndex) {
                buttons[index].classList.add('correct');
                score++;
            } else {
                buttons[index].classList.add('incorrect');
                buttons[correctIndex].classList.add('correct');
            }
            
            buttons.forEach(btn => btn.disabled = true);

            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < preguntas.length) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            document.getElementById('quiz-container').style.display = 'none';
            const resultScreen = document.getElementById('result-screen');
            const finalScoreText = document.getElementById('final-score');
            resultScreen.style.display = 'block';

            const porcentaje = (score / preguntas.length) * 100;
            let mensaje = "";
            let color = "";

            if (porcentaje >= 70) {
                mensaje = "¡Felicidades! Eres un experto mundialista. 🏆";
                color = "#28a745";
            } else if (porcentaje >= 40) {
                mensaje = "¡Buen intento! Conoces bastante. ⚽";
                color = "#FFD65C";
            } else {
                mensaje = "Suerte para la próxima... 📚";
                color = "#dc3545";
            }

            finalScoreText.innerHTML = `
                <div style="font-size: 2rem; margin-bottom: 10px;">${score} / ${preguntas.length}</div>
                <div style="color: ${color}; font-weight: bold; font-size: 1.2rem;">${mensaje}</div>
            `;
        }

        document.addEventListener('DOMContentLoaded', showQuestion);
    </script>

       <script src="menu.js"></script>
    </body>
</body>
</html>
