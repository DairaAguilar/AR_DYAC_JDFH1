<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escáner Mundial 2026</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <link rel="stylesheet" href="lector.css">
</head>

<body>

<a href="PaginaPrincipall.html" class="back-btn">Volver</a>

<div id="ui-overlay">
  <div class="scanner-corner top-left"></div>
  <div class="scanner-corner top-right"></div>
  <div class="scanner-corner bottom-left"></div>
  <div class="scanner-corner bottom-right"></div>
  <div class="scanning-line"></div>
</div>

<a-scene
  id="ar-scene"
  mindar-image="imageTargetSrc: ./banderas2.mind; autoStart: true; filterMinCF: 0.0005; filterBeta: 0.001;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
>

  <a-assets id="assets-container">
    <a-asset-item id="jugador-base" src="./modelos/jugador_base.glb"></a-asset-item>
    <a-asset-item id="jugador-animado" src="./modelos/jugador_animado.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

</a-scene>

<script src="lector.js"></script>

</body>
</html>
