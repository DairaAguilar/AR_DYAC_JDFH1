<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escáner Mundial 2026</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

  <link rel="stylesheet" href="lector.css">
  
  <style>
    /* ESTILOS PARA EL MODAL DE TRIVIA */
    .modal-trivia {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    
    .modal-trivia.active {
      opacity: 1;
      visibility: visible;
    }
    
    .modal-content {
      background: linear-gradient(135deg, #1A1A3A 0%, #2a2a5a 100%);
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      border-radius: 20px;
      border: 3px solid #FFD65C;
      padding: 20px;
      position: relative;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    
    .modal-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 30px;
      color: #FFD65C;
      cursor: pointer;
      background: none;
      border: none;
      font-weight: bold;
      transition: transform 0.2s;
    }
    
    .modal-close:hover {
      transform: scale(1.2);
    }
    
    .modal-title {
      text-align: center;
      color: #FFD65C;
      font-size: 1.8rem;
      margin-bottom: 20px;
      font-family: sans-serif;
    }
    
    .modal-body {
      color: white;
      font-family: sans-serif;
    }
    
    /* Estilos de preguntas dentro del modal */
    .quiz-card-modal {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #FFD65C;
    }
    
    .progress-bar-modal {
      width: 100%;
      height: 10px;
      background: #1A1A3A;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .progress-fill-modal {
      width: 0%;
      height: 100%;
      background: #FFD65C;
      transition: width 0.3s ease;
    }
    
    .options-grid-modal {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 20px;
    }
    
    .option-btn-modal {
      background: transparent;
      border: 1px solid white;
      color: white;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
      text-align: left;
    }
    
    .option-btn-modal:hover {
      background: rgba(255, 214, 92, 0.2);
      border-color: #FFD65C;
    }
    
    .option-btn-modal.correct {
      background: #28a745 !important;
      border-color: #28a745 !important;
    }
    
    .option-btn-modal.incorrect {
      background: #dc3545 !important;
      border-color: #dc3545 !important;
    }
    
    .feedback-modal {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }
    
    .result-screen-modal {
      text-align: center;
    }
    
    .final-score-modal {
      font-size: 2rem;
      margin: 20px 0;
      color: #FFD65C;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="loader-content">
      <div class="spinner"></div>
      <h1>MUNDIAL 2026</h1>
      <p>Inicializando cámara...</p>
    </div>
  </div>

  <button onclick="window.history.back()" class="back-btn" style="position: fixed; top: 20px; left: 20px; z-index: 10000;">VOLVER</button>

  <div id="ui-overlay">
    <div class="scanner-corner top-left"></div>
    <div class="scanner-corner top-right"></div>
    <div class="scanner-corner bottom-left"></div>
    <div class="scanner-corner bottom-right"></div>
    <div class="scanning-line"></div>
  </div>

  <!-- MODAL DE TRIVIA -->
  <div id="modalTrivia" class="modal-trivia">
    <div class="modal-content">
      <button class="modal-close" id="closeModalBtn">&times;</button>
      <h2 class="modal-title" id="modalTitle">TRIVIA</h2>
      <div class="modal-body" id="modalBody">
        <!-- Aquí se cargará el contenido de la trivia -->
      </div>
    </div>
  </div>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./banderas2.mind; autoStart: true; filterMinCF: 0.0005; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
  >

    <a-assets id="assets-container">
      <a-asset-item id="jugador-base" src="./modelos/jugador_base2.glb"></a-asset-item>
      <a-asset-item id="jugador-animado" src="./modelos/jugador_animado2.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  </a-scene>

  <script src="lector.js"></script>
  <script src="preguntas.js"></script>
  
  <script>
    // Variables globales para la trivia modal
    let modalTrivia = document.getElementById('modalTrivia');
    let currentQuestionIndex = 0;
    let score = 0;
    let currentPreguntas = null;
    let totalQuestions = 0;
    
    function abrirTriviaModal(paisId, equipoName) {
      // Obtener preguntas del banco global (preguntas.js)
      const preguntas = bancoPreguntas[paisId];
      
      if (!preguntas || preguntas.length === 0) {
        document.getElementById('modalBody').innerHTML = `
          <div style="text-align: center; padding: 20px;">
            <p>Lo sentimos, no hay preguntas disponibles para ${equipoName}</p>
            <button onclick="cerrarModalTrivia()" style="background: #FFD65C; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-top: 20px;">Cerrar</button>
          </div>
        `;
        document.getElementById('modalTitle').innerText = `${equipoName}`;
        modalTrivia.classList.add('active');
        return;
      }
      
      // Resetear estado
      currentQuestionIndex = 0;
      score = 0;
      currentPreguntas = preguntas;
      totalQuestions = preguntas.length;
      
      // Mostrar modal
      document.getElementById('modalTitle').innerHTML = `${equipoName} ⚽`;
      modalTrivia.classList.add('active');
      
      // Cargar primera pregunta
      mostrarPreguntaModal();
    }
    
    function mostrarPreguntaModal() {
      if (currentQuestionIndex >= currentPreguntas.length) {
        mostrarResultadosModal();
        return;
      }
      
      const question = currentPreguntas[currentQuestionIndex];
      const progressPercent = (currentQuestionIndex / totalQuestions) * 100;
      
      let html = `
        <div class="quiz-card-modal">
          <div class="progress-bar-modal">
            <div class="progress-fill-modal" style="width: ${progressPercent}%"></div>
          </div>
          <h3 style="margin-bottom: 15px;">${currentQuestionIndex + 1}. ${question.q}</h3>
          <div class="options-grid-modal" id="optionsModal">
      `;
      
      question.options.forEach((option, idx) => {
        html += `
          <button class="option-btn-modal" data-index="${idx}" onclick="seleccionarRespuestaModal(${idx}, ${question.correct})">
            ${option}
          </button>
        `;
      });
      
      html += `
          </div>
          <div id="feedbackModal" class="feedback-modal"></div>
        </div>
      `;
      
      document.getElementById('modalBody').innerHTML = html;
    }
    
    function seleccionarRespuestaModal(selectedIndex, correctIndex) {
      const buttons = document.querySelectorAll('.option-btn-modal');
      let isCorrect = (selectedIndex === correctIndex);
      
      if (isCorrect) {
        buttons[selectedIndex].classList.add('correct');
        score++;
        document.getElementById('feedbackModal').innerHTML = '<span style="color: #28a745;">✅ ¡Correcto!</span>';
      } else {
        buttons[selectedIndex].classList.add('incorrect');
        buttons[correctIndex].classList.add('correct');
        document.getElementById('feedbackModal').innerHTML = '<span style="color: #dc3545;">❌ Incorrecto</span>';
      }
      
      // Deshabilitar botones
      buttons.forEach(btn => btn.disabled = true);
      
      // Siguiente pregunta después de 1.5 segundos
      setTimeout(() => {
        currentQuestionIndex++;
        mostrarPreguntaModal();
      }, 1500);
    }
    
    function mostrarResultadosModal() {
      const porcentaje = (score / totalQuestions) * 100;
      let mensaje = "";
      let color = "";
      
      if (porcentaje >= 70) {
        mensaje = "🎉 ¡Felicidades! Eres un experto mundialista. 🏆";
        color = "#28a745";
      } else if (porcentaje >= 40) {
        mensaje = "👍 ¡Buen intento! Conoces bastante. ⚽";
        color = "#FFD65C";
      } else {
        mensaje = "📚 Sigue practicando... ¡la próxima será mejor!";
        color = "#dc3545";
      }
      
      const html = `
        <div class="result-screen-modal">
          <h2 style="color: #FFD65C;">RESULTADOS FINALES</h2>
          <div class="final-score-modal">${score} / ${totalQuestions}</div>
          <div style="color: ${color}; font-size: 1.2rem; margin: 20px 0;">${mensaje}</div>
          <button onclick="cerrarModalTrivia()" style="background: #FFD65C; border: none; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 15px;">
            Cerrar Trivia
          </button>
        </div>
      `;
      
      document.getElementById('modalBody').innerHTML = html;
      
      // Si ganó, lanzar confetti
      if (porcentaje >= 70) {
        window.confetti({
          particleCount: 150,
          spread: 70,
          origin: { y: 0.6 }
        });
      }
    }
    
    function cerrarModalTrivia() {
      modalTrivia.classList.remove('active');
      document.getElementById('modalBody').innerHTML = '';
    }
    
    // Cerrar modal con X o click fuera
    document.getElementById('closeModalBtn').onclick = cerrarModalTrivia;
    modalTrivia.onclick = (e) => {
      if (e.target === modalTrivia) cerrarModalTrivia();
    };
  </script>
</body>
</html>
